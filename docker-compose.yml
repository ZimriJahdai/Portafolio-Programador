services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: portafolio-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:8080}
      MONGODB_URI: ${MONGODB_URI:-}
      MONGODB_DB: ${MONGODB_DB:-portafolio}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
      OWNER_EMAIL: ${OWNER_EMAIL:-}
      CV_FILE_PATH: ${CV_FILE_PATH:-./assets/CV-Zimri-Lopez.pdf}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: portafolio-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
